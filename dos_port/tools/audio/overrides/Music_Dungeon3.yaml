# Music_Dungeon3 (Mt. Moon Cave) — per-song MIDI overrides.
#
# Yellow swaps channels vs the score transcription (like Lavender and
# Mansion): GB ch1 (physical square 1) is the score's "square 2" part —
# the repeating B-D#-G augmented-triad arpeggio (core register B3-G4,
# occasionally ranging F2-F5); GB ch2 (physical square 2) is the score's
# "square 1" — the wide-ranging whole-tone melody (E3-C#6). GB ch3 (wave)
# only enters at "rehearsal 1" (frame 1620) for the ritardando chromatic
# descent E5->E4, confirmed note-for-note by simulation. GB ch4 (noise)
# never sounds in this song — no drums section needed. Single 4983-frame
# loop, no nested-loop unroll required. Registers/loop verified from the
# generated MIDI 2026-07-07; patches chosen for the augmented/whole-tone
# "enigmatic cave" character per the score analysis (mt_moon_cave.md).
channels:
  1:
    mt32_program: "Glasses"      # glassy, faintly eerie — the augmented
                                  # arpeggio ostinato that drives the cave
    gm_program: "FX 3 (crystal)"
    volume: 96
    pan: 44
  2:
    mt32_program: "Soundtrack"   # atmospheric synth lead for the
                                  # whole-tone melody's ambiguous tonality
    gm_program: "FX 2 (soundtrack)"
    volume: 104
    pan: 74
  3:
    mt32_program: "Tube Bell"    # cave-echo/dripping-stone quality for
                                  # the rehearsal-1 chromatic descent
    gm_program: "Tubular Bells"
    volume: 100
