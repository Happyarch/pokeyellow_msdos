# Music_PalletTown — per-song MIDI overrides (see README.md for schema).
# Registers verified from the generated MIDI 2026-07-07: ch1 melody C4-G5,
# ch2 high harmony E5-G6, ch3 inner line C4-A4 (the score-analysis "high
# register" track — the wave 'bass' lives above middle C; the real low end
# is the tier-1 enhancement layer). Nostalgic-warm families, one per line:
channels:
  1:
    mt32_program: "Flute 1"     # gentle lyrical melody, home register
    gm_program: "Flute"
    volume: 100
    pan: 54
  2:
    mt32_program: "Str Sect 3"  # soft section shimmer up high (proved out
    gm_program: "String Ensemble 1"  # in this register on Lavender's ch2)
    volume: 92
    pan: 74
  3:
    mt32_program: "Harp 1"      # plucked warmth for the treble inner line
    gm_program: "Orchestral Harp"
    volume: 104                 # was 110 (default) — under the melody
