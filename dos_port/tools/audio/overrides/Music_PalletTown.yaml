# Music_PalletTown — worked example of the override schema (see README.md).
# Starting point only; real values come from the MUNT audition loop.
# NOTE: the mt32_program names spell out what the old GM-numbered
# placeholders (80/80/38) actually select on the factory bank — two
# identical saxes + a bell. Untuned; retune by ear (see Music_Celadon.yaml
# for the same fix applied).
channels:
  1: {mt32_program: "Sax 3", gm_program: "Lead 1 (square)", volume: 100, pan: 54}  # melody
  2: {mt32_program: "Sax 3", gm_program: "Lead 1 (square)", volume: 92, pan: 74}   # harmony
  3: {mt32_program: "Warm Bell", gm_program: "Synth Bass 1", volume: 110}          # bass
