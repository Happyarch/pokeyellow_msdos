schema: 1
song: Music_CinnabarMansion

# Tier-1 pass (2026-07-07). Dungeon rule: one sparse voice at most.
#
# ruin_depth — the steady wave bass (ch3, 36-bar loop, B2-G#3) doubled
# note-for-note one octave below (transpose -12 -> B1-G#2, the empty
# contrabass register): the classic 16'-stop bass reinforcement, no
# invented material. OPL sync note: the enhancement stream loops at
# 15552f while engine ch1 drifts on its ~7 h cycle, so an added voice
# must never follow ch1 or the detected chords — ch3's 3888f period
# divides the stream loop, so this doubling stays locked forever on
# both paths. Pattern = ch3's first statement extracted from the engine
# simulation (frames -> 27f beat grid, exact); instances at every
# 36-measure statement boundary across intro + loop body.
channels:
  - name: ruin_depth
    tier: 1
    opl_patch: sub_bass       # pure sine — depth, not timbre
    mt32_patch: 57            # Contrabass (its true register this time)
    gm_program: 44            # Contrabass
    pan: center
    volume: 52                # felt more than heard
    velocity: 70
    transpose: -12
    events:
      - {at: 1,   pattern: statement}
      - {at: 37,  pattern: statement}
      - {at: 73,  pattern: statement}
      - {at: 109, pattern: statement}
      - {at: 145, pattern: statement_last}  # final note shaved (song-end fence)

