schema: 1
song: Music_Lavender

# Tier-1 pass (2026-07-07). The skill's own table says Lavender gets
# "almost nothing — don't soften the eeriness" (0-1 voices), and the score
# analysis warns the tonal ambiguity is the point. So: ONE voice, and it
# adds dread instead of warmth.
#
# grave_seesaw — a continuous contra-octave drone seesaw: legato half
# notes C2 (b1) -> B1 (b3), the piece's own C<->B half-step unease moved
# into the register nothing in the GB mix occupies (floor is B3). It
# follows the harmony nowhere: in the 20-bar excursion measures it rubs
# against Em7/D7/Cdim exactly the way the GB's own persistent figure
# does. Rests through the 4-bar solo-figure intro; enters at m5.
# v1 was quarter-note throbs on the heartbeat at vol 64 — user audition
# 2026-07-07: "kinda like a funk backtrack, too bass heavy". The funk was
# the articulation (short hits in the drum pocket); now it drones.
channels:
  - name: grave_seesaw
    tier: 1
    opl_patch: sub_bass       # pure sine — complements, never fights, the pulses
    mt32_patch: 30            # Syn Bass 2 (dark, round)
    gm_program: 39            # Synth Bass 1
    pan: center
    volume: 48                # a floor, not a voice (v1's 64 was too present)
    velocity: 60
