# tools/audio/mt32/timbres.yaml — hand-editable MT-32 setup + custom timbres.
# Compiled by gen_mt32_patches.py into assets/mt32_sysex.inc, uploaded at
# init when /MT32. This is where the MUNT audition loop iterates (the MT-32
# counterpart of gen_opl_patches.py's PATCHES dict); `make assets` reads it,
# never writes it. Parameter names/ranges: gen_mt32_patches.py + docs/sound/
# Roland_MT_32_Midi_Implementation.md.

lcd: "POKEMON YELLOW  DOS!"

system:
  reverb_mode: 1          # 0 room, 1 hall, 2 plate, 3 tap delay
  reverb_time: 5          # 0-7
  reverb_level: 4         # 0-7
  # Parts 1-8 + rhythm; one message, sum <= 32. Parts 1-3 carry the three
  # GB melodic channels; rhythm gets the noise drums.
  partial_reserves: [10, 10, 4, 1, 1, 1, 1, 1, 3]
  # Factory default routing (0 = MIDI ch 1): parts 1-8 <- ch 2-9, rhythm <- 10.
  midi_channels: [1, 2, 3, 4, 5, 6, 7, 8, 9]
  master_volume: 100

# Custom timbres upload to Timbre Memory #1.. in list order. To play one,
# rewrite a Patch Memory slot below (timbre_group: 2, timbre_number: index)
# and point the song override's mt32_program at that slot - 1.
# Starting set: none — the first hand-tuned timbres come out of the MUNT
# audition (Phase B task 4); presets via overrides until then.
timbres: []

patches: []

rhythm: []
