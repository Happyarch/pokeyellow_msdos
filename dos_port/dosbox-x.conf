; dos_port/dosbox-x.conf — tracked repo config for PKMN.EXE testing.
; Loaded by dos_port/run, which also passes -defaultconf so the user's system
; config is NOT loaded (no stray host mounts / Z: overrides leak in).
;
; ISOLATION: C: is a self-contained, partitioned FAT16 disk image (PKMN.IMG,
; built by `make image`), NOT the host filesystem — the game's saves and any
; buffer-overflow / OOB disk writes stay inside that image, at any BUG_FIX_LEVEL.
; No host directory is ever mounted; Z: stays the built-in virtual DOS drive.
; (-securemode is deliberately NOT used: it restricts the memory/DPMI services
; CWSDPMI needs, so the DPMI game won't start under it.)
;
; Target hardware baseline: 386SX @ ~20 MHz ≈ 23880 cycles in DOSBox-X.

[dosbox]
machine                   = vgaonly

[dos]
automount                 = false

[video]
memory io optimization 1  = false

[cpu]
cputype                   = 386_prefetch
cycles                    = fixed 23880
cycleup                   = 500
cycledown                 = 500

[autoexec]
imgmount c PKMN.IMG -t hdd -fs fat
c:
PKMN.EXE
